services:
  - type: web
    name: sif-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m api.main"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
