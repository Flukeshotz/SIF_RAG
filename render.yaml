services:
  - type: web
    name: sif-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    disk:
      name: sif-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_PATH
        value: /app/data/qdrant
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
