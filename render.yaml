services:
  - type: web
    name: sif-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
    disk:
      name: sif-data
      mountPath: /app/data
      sizeGB: 10
